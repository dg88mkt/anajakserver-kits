<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ការទូទាត់ជោគជ័យ | ANAJAK</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@300;400;700&display=swap');
        
        body {
            background-color: #050505;
            color: #fff;
            font-family: 'Kantumruy Pro', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
            overflow: hidden;
            line-height: 1.6;
        }

        .check-container {
            width: 100px;
            height: 100px;
            background: #2ecc71;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            box-shadow: 0 0 40px rgba(46, 204, 113, 0.4);
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            margin: 0 auto 30px;
            color: #000;
        }

        @keyframes popIn { 
            from { transform: scale(0) rotate(-45deg); opacity: 0; } 
            to { transform: scale(1) rotate(0deg); opacity: 1; } 
        }
        
        .timer-text { 
            opacity: 0.6; 
            font-size: 14px; 
            font-weight: 400; 
            margin-top: 60px; 
            letter-spacing: 0.05em;
        }

        h1 {
            letter-spacing: 0.02em;
        }
    </style>
</head>
<body>
    
    <main>
        <div class="check-container">
            <i class="fas fa-check"></i>
        </div>
        
        <h1 class="text-3xl md:text-5xl font-extrabold uppercase mb-6">ទទួលបានការបង់ប្រាក់រួចរាល់</h1>
        
        <p class="text-gray-400 max-w-sm mx-auto text-lg font-light">
            សូមអរគុណសម្រាប់ការគាំទ្រដល់អាណាចក្រ (ANAJAK SERVER)។ ក្រុមការងារយើងកំពុងពិនិត្យមើលការបញ្ជាទិញរបស់អ្នក ហើយនឹងទាក់ទងទៅអ្នកក្នុងពេលឆាប់ៗនេះ។
        </p>
        
        <p class="timer-text">កំពុងត្រឡប់ទៅកាន់ទំព័រដើមវិញក្នុងរយៈពេល <span id="countdown" class="text-green-500 font-bold">10</span> វិនាទី</p>
    </main>

    <script>
        // Automatic Redirect Loop
        let seconds = 10;
        const countdownEl = document.getElementById('countdown');

        const timer = setInterval(() => {
            seconds--;
            countdownEl.innerText = seconds;
            if (seconds <= 0) {
                clearInterval(timer);
                // REDIRECT BACK to index.html
                window.location.href = "index.html";
            }
        }, 1000);
    </script>

</body>
</html>
